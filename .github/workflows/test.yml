name: Run Tests
run-name: ${{ github.head_ref || github.ref_name }}-test-run

on:
  push:
    branches:
      - mains
  pull_request:
    paths-ignore:
      - '**.yml'
      - '**.md'
  workflow_dispatch:


concurrency:
  group: test-run-${{ github.event.number }}
  cancel-in-progress: true


jobs:
  unit-test:
    name: "GBSNCM Tests"
    runs-on: 'ubuntu-22.04'
    timeout-minutes: 10 # The overall timeout
    permissions:
      actions: write
      checks: write
      contents: write
      pull-requests: write
      statuses: write

    steps:
      # checkout your repository
      - uses: actions/checkout@v4
        with:
          lfs: true
      # run tests by using the gdUnit4-action with Godot version 4.2.1 and the latest GdUnit4 release 
      - uses: MikeSchulze/gdUnit4-action@v1.0.2
        with:
          godot-version: '4.6'
          paths: |
            res://addons/gbsn_core_mechanics/test/
          timeout: 5
          report-name: test_report.xml  